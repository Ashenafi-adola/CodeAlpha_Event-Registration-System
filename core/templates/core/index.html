{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>

<body>
    <header>
        <form action="{% url 'signout' %}" method="post">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </header>
    <div class="main-content">

        <form action="" method="post">
            {% csrf_token %}
            {{form.as_p}}
            <button type="submit">Add Event</button>
        </form>
        <hr>
        <div>
            {% for event in events %}
                <a href="{% url 'detail' event.id %}" style="text-decoration: none;">
                    <div class="event-card" style="margin-bottom:1.5rem; padding:1rem; border-radius:8px; background:#f8fafc; box-shadow:0 1px 4px rgba(44,62,80,0.04);">
                        <p style="font-size:1.2rem; font-weight:600; color:#2d3e50;">{{event.title}}</p>
                        <p style="color:#34495e;">{{event.description}}</p>
                        {% if event.completed == True %}
                            <span class="alert" style="display:inline-block; margin-top:0.5rem;">Completed</span>
                        {% else %}
                            <span class="alert" style="display:inline-block; margin-top:0.5rem; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;">Not Completed</span>
                        {% endif %}
                    </div>
                </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
